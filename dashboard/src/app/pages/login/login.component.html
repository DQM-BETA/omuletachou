<div class="login-page">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>omuletachou — Painel Admin</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" data-testid="email-input" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Senha</mat-label>
          <input matInput type="password" formControlName="password" data-testid="password-input" />
        </mat-form-field>

        <p class="error-message" role="alert" *ngIf="errorMessage" data-testid="login-error">
          {{ errorMessage }}
        </p>

        <button
          mat-flat-button
          color="primary"
          type="submit"
          class="full-width"
          data-testid="login-submit"
          [disabled]="loading"
        >
          <mat-spinner *ngIf="loading" diameter="20" class="inline-spinner"></mat-spinner>
          <span *ngIf="!loading">Entrar</span>
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
